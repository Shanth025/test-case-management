<svg width="260" height="52" viewBox="0 0 260 52" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TCM Docs logo — dark variant</title>
  <desc>Dark mode logo for the Test Case Management documentation site.</desc>

  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <g transform="translate(26,26)">
    <circle cx="0" cy="0" r="4.2" fill="url(#gd)"/>
    <ellipse cx="0" cy="0" rx="22" ry="8.5" fill="none" stroke="url(#gd)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="22" ry="8.5" fill="none" stroke="url(#gd)" stroke-width="2" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="22" ry="8.5" fill="none" stroke="url(#gd)" stroke-width="2" transform="rotate(120)"/>
    <circle cx="22" cy="0" r="3" fill="url(#gd)"/>
    <g transform="rotate(60)"><circle cx="22" cy="0" r="3" fill="url(#gd)"/></g>
    <g transform="rotate(120)"><circle cx="22" cy="0" r="3" fill="url(#gd)"/></g>
  </g>

  <line x1="58" y1="8" x2="58" y2="44" stroke="#334155" stroke-width="0.75"/>

  <text x="67" y="32"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="28" letter-spacing="-0.8"
    fill="#F1F5F9">
    <tspan font-weight="500">tcm</tspan><tspan font-weight="300" fill="#64748B"> Docs</tspan>
  </text>

  <text x="68" y="44"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="8" font-weight="400" letter-spacing="1.8"
    fill="#475569">TEST CASE MANAGEMENT</text>
</svg>
