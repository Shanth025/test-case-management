<svg width="340" height="52" viewBox="0 0 340 52" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TestFlow Docs logo — dark variant</title>
  <desc>Dark mode logo for the TestFlow documentation site.</desc>

  <defs>
    <linearGradient id="atom-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- React-style atom icon: 3 elliptical orbits + nucleus -->
  <g transform="translate(26,26)">
    <!-- Orbit 1: horizontal -->
    <ellipse cx="0" cy="0" rx="22" ry="8.5"
      fill="none" stroke="url(#atom-grad-dark)" stroke-width="2.2"
      stroke-linecap="round"/>
    <!-- Orbit 2: rotated 60° -->
    <ellipse cx="0" cy="0" rx="22" ry="8.5"
      fill="none" stroke="url(#atom-grad-dark)" stroke-width="2.2"
      stroke-linecap="round" transform="rotate(60)"/>
    <!-- Orbit 3: rotated 120° -->
    <ellipse cx="0" cy="0" rx="22" ry="8.5"
      fill="none" stroke="url(#atom-grad-dark)" stroke-width="2.2"
      stroke-linecap="round" transform="rotate(120)"/>
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="4.5" fill="url(#atom-grad-dark)"/>
  </g>

  <!-- Divider -->
  <line x1="58" y1="9" x2="58" y2="43" stroke="#334155" stroke-width="0.75"/>

  <!-- Wordmark -->
  <text
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="22"
    letter-spacing="-0.5">
    <!-- "TestFlow" bold, light text -->
    <tspan x="68" y="28" font-weight="600" fill="#F1F5F9">TestFlow</tspan>
    <!-- " Docs" thin, muted -->
    <tspan font-weight="300" fill="#64748B"> Docs</tspan>
  </text>

  <!-- Tagline -->
  <text x="69" y="43"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="7.5" font-weight="400" letter-spacing="1.6"
    fill="#475569">QA TESTING PLATFORM</text>
</svg>
