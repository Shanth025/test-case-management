<svg width="260" height="52" viewBox="0 0 260 52" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TCM Docs logo — light variant</title>
  <desc>Light mode logo for the Test Case Management documentation site.</desc>

  <defs>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F6EF7"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <g transform="translate(26,26)">
    <circle cx="0" cy="0" r="4.2" fill="url(#gl)"/>
    <ellipse cx="0" cy="0" rx="22" ry="8.5" fill="none" stroke="url(#gl)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="22" ry="8.5" fill="none" stroke="url(#gl)" stroke-width="2" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="22" ry="8.5" fill="none" stroke="url(#gl)" stroke-width="2" transform="rotate(120)"/>
    <circle cx="22" cy="0" r="3" fill="url(#gl)"/>
    <g transform="rotate(60)"><circle cx="22" cy="0" r="3" fill="url(#gl)"/></g>
    <g transform="rotate(120)"><circle cx="22" cy="0" r="3" fill="url(#gl)"/></g>
  </g>

  <line x1="58" y1="8" x2="58" y2="44" stroke="#CBD5E1" stroke-width="0.75"/>

  <!-- Single text element keeps "tcm" and "Docs" naturally close with one space -->
  <text x="67" y="32"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="28" letter-spacing="-0.8"
    fill="#111827">
    <tspan font-weight="500">tcm</tspan><tspan font-weight="300" fill="#6B7280"> Docs</tspan>
  </text>

  <text x="68" y="44"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="8" font-weight="400" letter-spacing="1.8"
    fill="#9CA3AF">TEST CASE MANAGEMENT</text>
</svg>
