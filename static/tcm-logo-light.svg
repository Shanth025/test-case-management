<svg width="340" height="52" viewBox="0 0 340 52" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TestFlow Docs logo — light variant</title>
  <desc>Light mode logo for the TestFlow documentation site.</desc>

  <defs>
    <linearGradient id="atom-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- React-style atom icon: 3 elliptical orbits + nucleus -->
  <g transform="translate(26,26)">
    <!-- Orbit 1: horizontal -->
    <ellipse cx="0" cy="0" rx="22" ry="8.5"
      fill="none" stroke="url(#atom-grad-light)" stroke-width="2.2"
      stroke-linecap="round"/>
    <!-- Orbit 2: rotated 60° -->
    <ellipse cx="0" cy="0" rx="22" ry="8.5"
      fill="none" stroke="url(#atom-grad-light)" stroke-width="2.2"
      stroke-linecap="round" transform="rotate(60)"/>
    <!-- Orbit 3: rotated 120° -->
    <ellipse cx="0" cy="0" rx="22" ry="8.5"
      fill="none" stroke="url(#atom-grad-light)" stroke-width="2.2"
      stroke-linecap="round" transform="rotate(120)"/>
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="4.5" fill="url(#atom-grad-light)"/>
  </g>

  <!-- Divider -->
  <line x1="58" y1="9" x2="58" y2="43" stroke="#CBD5E1" stroke-width="0.75"/>

  <!-- Wordmark -->
  <text
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="22"
    letter-spacing="-0.5">
    <!-- "TestFlow" bold, dark text for light backgrounds -->
    <tspan x="68" y="28" font-weight="600" fill="#0F172A">TestFlow</tspan>
    <!-- " Docs" thin, muted slate -->
    <tspan font-weight="300" fill="#94A3B8"> Docs</tspan>
  </text>

  <!-- Tagline -->
  <text x="69" y="43"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="7.5" font-weight="400" letter-spacing="1.6"
    fill="#94A3B8">QA TESTING PLATFORM</text>
</svg>
